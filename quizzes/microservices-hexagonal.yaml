id: microservices-hexagonal
title: "Quiz — Architecture Hexagonale"
description: "Testez votre compréhension de l'architecture hexagonale (Ports & Adapters) et de son implémentation en Go."
version: "1.1.0"
covers:
  - course: microservices-kubernetes
    modules:
      - "Introduction aux Microservices"
      - "Architecture Hexagonale (Ports & Adapters)"
passing_score: 70
cooldown:
  strategy: exponential
  base_seconds: 30
  multiplier: 2.0
  max_seconds: 600
max_attempts_per_question: 5
lock_on_max_attempts: false
questions:

  - id: q1
    type: single
    difficulty: easy
    points: 1
    question: |
      Dans l'architecture hexagonale, où se trouve la logique métier ?
    answers:
      - id: a
        text: "Dans la couche HTTP (contrôleurs)"
        correct: false
      - id: b
        text: "Au centre de l'hexagone, dans le domaine"
        correct: true
      - id: c
        text: "Dans la base de données"
        correct: false
      - id: d
        text: "Dans les variables d'environnement"
        correct: false
    feedback:
      wrong: "La logique métier est dans le domaine, au cœur de l'hexagone — pas dans HTTP ni en base."
      correct: "Exact ! Le domaine est au centre, indépendant de toute infrastructure."

  - id: q2
    type: single
    difficulty: easy
    points: 1
    question: |
      Qu'est-ce qu'un "Port" dans l'architecture hexagonale ?
    answers:
      - id: a
        text: "Un numéro de port TCP (ex: 8080)"
        correct: false
      - id: b
        text: "Une interface Go définissant comment le domaine interagit avec l'extérieur"
        correct: true
      - id: c
        text: "Un package Go externe"
        correct: false
      - id: d
        text: "Une variable d'environnement"
        correct: false
    feedback:
      wrong: "Un Port hexagonal est une interface (contrat), pas un port réseau."
      correct: "Exact ! Les ports sont des interfaces qui définissent les interactions sans couplage à l'implémentation."

  - id: q3
    type: boolean
    difficulty: easy
    points: 1
    question: |
      Le package `domain` peut importer `database/sql` pour interagir directement avec la base de données.
    correct_answer: false
    feedback:
      wrong: "Le domaine ne doit jamais importer de packages d'infrastructure. Il interagit uniquement via des interfaces (ports)."
      correct: "Correct ! Le domaine est pur — sans dépendances externes. La règle de dépendance va vers l'intérieur."

  - id: q4
    type: multiple
    difficulty: medium
    points: 2
    question: |
      Quels sont les avantages de l'architecture hexagonale pour les tests ?
    answers:
      - id: a
        text: "On peut tester le domaine sans démarrer de base de données"
        correct: true
      - id: b
        text: "Les tests sont automatiquement générés"
        correct: false
      - id: c
        text: "On peut remplacer PostgreSQL par un repository en mémoire"
        correct: true
      - id: d
        text: "On n'a plus besoin d'écrire de tests"
        correct: false
    partial_scoring:
      enabled: true
      allow_negative: false
    feedback:
      wrong: "Les ports (interfaces) permettent d'injecter des faux adaptateurs (in-memory) pour tester sans infra."
      correct: "Exact ! La testabilité est l'un des principaux bénéfices de l'architecture hexagonale."

  - id: q5
    type: order
    difficulty: medium
    points: 2
    question: |
      Remettez dans l'ordre les couches de l'architecture hexagonale, de la plus externe vers la plus interne.
    items:
      - id: i1
        text: "Infrastructure (PostgreSQL, HTTP, Kafka)"
      - id: i2
        text: "Application (Use Cases)"
      - id: i3
        text: "Ports (interfaces)"
      - id: i4
        text: "Domaine (entités, règles métier)"
    correct_order: [i1, i2, i3, i4]
    feedback:
      wrong: "De l'extérieur vers l'intérieur : Infrastructure → Application → Ports → Domaine."
      correct: "Parfait ! Les dépendances vont toujours de l'extérieur vers le centre."
