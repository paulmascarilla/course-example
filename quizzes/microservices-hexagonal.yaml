id: microservices-hexagonal
title: "Quiz — Architecture Hexagonale"
description: "Testez votre compréhension de l'architecture hexagonale (Ports & Adapters) et de son implémentation en Go."
version: "1.1.0"
covers:
  - course: microservices-kubernetes
    modules:
      - "Introduction aux Microservices"
      - "Architecture Hexagonale (Ports & Adapters)"
passing_score: 70
cooldown:
  strategy: exponential
  base_seconds: 30
  multiplier: 2.0
  max_seconds: 600
max_attempts_per_question: 5
lock_on_max_attempts: false
questions:

  - id: q1
    type: single
    difficulty: easy
    points: 1
    question: |
      Dans l'architecture hexagonale, où se trouve la logique métier ?
    answers:
      - id: a
        text: "Dans la couche HTTP (contrôleurs)"
        correct: false
      - id: b
        text: "Au centre de l'hexagone, dans le domaine"
        correct: true
      - id: c
        text: "Dans la base de données"
        correct: false
      - id: d
        text: "Dans les variables d'environnement"
        correct: false
    feedback:
      wrong: "La logique métier est dans le domaine, au cœur de l'hexagone — pas dans HTTP ni en base."
      correct: "Exact ! Le domaine est au centre, indépendant de toute infrastructure."

  - id: q2
    type: single
    difficulty: easy
    points: 1
    question: |
      Qu'est-ce qu'un "Port" dans l'architecture hexagonale ?
    answers:
      - id: a
        text: "Un numéro de port TCP (ex: 8080)"
        correct: false
      - id: b
        text: "Une interface Go définissant comment le domaine interagit avec l'extérieur"
        correct: true
      - id: c
        text: "Un package Go externe"
        correct: false
      - id: d
        text: "Une variable d'environnement"
        correct: false
    feedback:
      wrong: "Un Port hexagonal est une interface (contrat), pas un port réseau."
      correct: "Exact ! Les ports sont des interfaces qui définissent les interactions sans couplage à l'implémentation."

  - id: q3
    type: boolean
    difficulty: easy
    points: 1
    question: |
      Le package `domain` peut importer `database/sql` pour interagir directement avec la base de données.
    correct_answer: false
    feedback:
      wrong: "Le domaine ne doit jamais importer de packages d'infrastructure. Il interagit uniquement via des interfaces (ports)."
      correct: "Correct ! Le domaine est pur — sans dépendances externes. La règle de dépendance va vers l'intérieur."

