<svg xmlns="http://www.w3.org/2000/svg" viewBox="76 121 1038 483" width="1200" height="558" role="img" aria-label="Schema 12 — API Gateway">
<style>
:root{--ink:#2b2f36;--ink-soft:#6b7280;--line:#e2e6ef;--fill:#f3f5f9;--paper:#fff;--blue:#1b86f2;--blue-deep:#1466c4;--blue-soft:#e2f0fd;--orange:#ff9d18;--good:#3bb273;--bad:#e5534b}
svg{background:var(--paper);font-family:"Hanken Grotesk",Inter,Arial,sans-serif;color:var(--ink)}
.title{font-size:34px;font-weight:800;fill:var(--ink)}.subtitle{font-size:16px;fill:var(--ink-soft)}
.brand{font-family:"Caveat",cursive;font-weight:700;font-size:28px;fill:var(--blue-deep)}
.code{font-family:"JetBrains Mono",monospace;font-size:15px;fill:var(--ink-soft)}
.box{fill:var(--paper);stroke:var(--line);stroke-width:2;rx:20;filter:url(#shadow)}
.soft{fill:var(--fill);stroke:var(--line);stroke-width:2;rx:16}.label{font-size:22px;font-weight:800;fill:var(--ink)}.small{font-size:15px;fill:var(--ink-soft)}.mini{font-size:13px;fill:var(--ink-soft)}
.arrow{stroke:var(--blue);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowOrange{stroke:var(--orange);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowGood{stroke:var(--good);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.flow{stroke-dasharray:8 14;animation:dash 1.1s linear infinite}.packet{filter:url(#glow)}
@keyframes dash{to{stroke-dashoffset:-44}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.badge{fill:var(--blue-soft);stroke:var(--blue);stroke-width:1.5}
</style>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2b2f36" flood-opacity="0.08"/></filter>
<filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<text x="595" y="149" text-anchor="middle" font-size="14" fill="#6b7280" font-style="italic">Point d'entrée unique — le gateway route, authentifie et limite le débit avant de transmettre aux services</text>

<!-- Client -->
<circle cx="170" cy="385" r="70" fill="#e2f0fd" stroke="#1b86f2" stroke-width="2"/>
<text x="170" y="379" text-anchor="middle" class="label">Client</text>
<text x="170" y="404" text-anchor="middle" class="small">web / mobile</text>

<!-- API Gateway box -->
<rect x="400" y="315" width="290" height="140" rx="20" filter="url(#shadow)" fill="#fff" stroke="#1b86f2" stroke-width="2"/>
<rect x="424" y="339" width="56" height="56" rx="16" fill="#e2f0fd" stroke="#1b86f2" stroke-width="2"/>
<text x="545" y="373" text-anchor="middle" class="label">API Gateway</text>
<text x="545" y="400" text-anchor="middle" class="small">auth · routing</text>
<text x="545" y="421" text-anchor="middle" class="small">rate limit · aggregation</text>

<!-- Arrow Client → Gateway -->
<path id="gw" d="M240,385 L400,385" class="arrow flow"/>
<circle r="8" fill="#1b86f2" class="packet"><animateMotion dur="1.4s" repeatCount="indefinite" rotate="auto"><mpath href="#gw"/></animateMotion></circle>

<!-- user-service -->
<rect x="830" y="195" width="260" height="110" rx="20" filter="url(#shadow)" fill="#fff" stroke="#e2e6ef" stroke-width="2"/>
<rect x="854" y="219" width="56" height="56" rx="16" fill="#ff9d18" opacity=".12" stroke="#ff9d18" stroke-width="2"/>
<text x="930" y="253" text-anchor="middle" class="label">user-service</text>
<text x="930" y="283" text-anchor="middle" class="small">/api/users</text>
<path id="fan0" d="M690,385 C760,385 760,250 830,250" class="arrow flow" stroke="#ff9d18"/>
<circle r="8" fill="#ff9d18" class="packet"><animateMotion dur="1.9s" repeatCount="indefinite" rotate="auto"><mpath href="#fan0"/></animateMotion></circle>

<!-- order-service -->
<rect x="830" y="330" width="260" height="110" rx="20" filter="url(#shadow)" fill="#fff" stroke="#e2e6ef" stroke-width="2"/>
<rect x="854" y="354" width="56" height="56" rx="16" fill="#1b86f2" opacity=".12" stroke="#1b86f2" stroke-width="2"/>
<text x="930" y="388" text-anchor="middle" class="label">order-service</text>
<text x="930" y="418" text-anchor="middle" class="small">/api/orders</text>
<path id="fan1" d="M690,385 L830,385" class="arrow flow" stroke="#1b86f2"/>
<circle r="8" fill="#1b86f2" class="packet"><animateMotion dur="1.9s" repeatCount="indefinite" rotate="auto"><mpath href="#fan1"/></animateMotion></circle>

<!-- product-service -->
<rect x="830" y="465" width="260" height="110" rx="20" filter="url(#shadow)" fill="#fff" stroke="#e2e6ef" stroke-width="2"/>
<rect x="854" y="489" width="56" height="56" rx="16" fill="#3bb273" opacity=".12" stroke="#3bb273" stroke-width="2"/>
<text x="930" y="523" text-anchor="middle" class="label">product-service</text>
<text x="930" y="553" text-anchor="middle" class="small">/api/products</text>
<path id="fan2" d="M690,385 C760,385 760,520 830,520" class="arrow flow" stroke="#3bb273"/>
<circle r="8" fill="#3bb273" class="packet"><animateMotion dur="1.9s" repeatCount="indefinite" rotate="auto"><mpath href="#fan2"/></animateMotion></circle>
</svg>
