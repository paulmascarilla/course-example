<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 165 1200 595" width="1200" height="595" role="img" aria-label="Schema 1 — Bounded Contexts">
<style>
:root{--ink:#2b2f36;--ink-soft:#6b7280;--line:#e2e6ef;--fill:#f3f5f9;--paper:#fff;--blue:#1b86f2;--blue-deep:#1466c4;--blue-soft:#e2f0fd;--orange:#ff9d18;--good:#3bb273;--bad:#e5534b}
svg{background:var(--paper);font-family:"Hanken Grotesk",Inter,Arial,sans-serif;color:var(--ink)}
.title{font-size:34px;font-weight:800;fill:var(--ink)}.subtitle{font-size:16px;fill:var(--ink-soft)}
.brand{font-family:"Caveat",cursive;font-weight:700;font-size:28px;fill:var(--blue-deep)}
.code{font-family:"JetBrains Mono",monospace;font-size:15px;fill:var(--ink-soft)}
.box{fill:var(--paper);stroke:var(--line);stroke-width:2;rx:20;filter:url(#shadow)}
.soft{fill:var(--fill);stroke:var(--line);stroke-width:2;rx:16}.label{font-size:22px;font-weight:800;fill:var(--ink)}.small{font-size:15px;fill:var(--ink-soft)}.mini{font-size:13px;fill:var(--ink-soft)}
.arrow{stroke:var(--blue);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowOrange{stroke:var(--orange);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowGood{stroke:var(--good);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.flow{stroke-dasharray:8 14;animation:dash 1.1s linear infinite}.packet{filter:url(#glow)}
@keyframes dash{to{stroke-dashoffset:-44}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.badge{fill:var(--blue-soft);stroke:var(--blue);stroke-width:1.5}.dbtop{fill:var(--blue-soft);stroke:var(--blue-deep);stroke-width:2}.dbbody{fill:var(--paper);stroke:var(--blue-deep);stroke-width:2}
</style>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2b2f36" flood-opacity="0.08"/></filter>
<filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#1b86f2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#ff9d18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowGood" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#3bb273" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="90" y="250" width="320" height="180" class="box"/><rect x="114" y="274" width="56" height="56" rx="16" fill="#1b86f2" opacity=".12" stroke="#1b86f2" stroke-width="2"/><text x="190" y="308" class="label">user-service</text><text x="190" y="338" class="small">Entity: User</text><rect x="430" y="250" width="320" height="180" class="box"/><rect x="454" y="274" width="56" height="56" rx="16" fill="#ff9d18" opacity=".12" stroke="#ff9d18" stroke-width="2"/><text x="530" y="308" class="label">order-service</text><text x="530" y="338" class="small">Entity: Order</text><rect x="770" y="250" width="320" height="180" class="box"/><rect x="794" y="274" width="56" height="56" rx="16" fill="#3bb273" opacity=".12" stroke="#3bb273" stroke-width="2"/><text x="870" y="308" class="label">billing-service</text><text x="870" y="338" class="small">Entity: Invoice</text></svg>