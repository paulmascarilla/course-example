<svg xmlns="http://www.w3.org/2000/svg" viewBox="246 151 718 588" width="1200" height="983" role="img" aria-label="Schema 5 — Hexagonal architecture">
<style>
:root{--ink:#2b2f36;--ink-soft:#6b7280;--line:#e2e6ef;--fill:#f3f5f9;--paper:#fff;--blue:#1b86f2;--blue-deep:#1466c4;--blue-soft:#e2f0fd;--orange:#ff9d18;--good:#3bb273;--bad:#e5534b}
svg{background:var(--paper);font-family:"Hanken Grotesk",Inter,Arial,sans-serif;color:var(--ink)}
.title{font-size:34px;font-weight:800;fill:var(--ink)}.subtitle{font-size:16px;fill:var(--ink-soft)}
.brand{font-family:"Caveat",cursive;font-weight:700;font-size:28px;fill:var(--blue-deep)}
.code{font-family:"JetBrains Mono",monospace;font-size:15px;fill:var(--ink-soft)}
.box{fill:var(--paper);stroke:var(--line);stroke-width:2;rx:20;filter:url(#shadow)}
.soft{fill:var(--fill);stroke:var(--line);stroke-width:2;rx:16}.label{font-size:22px;font-weight:800;fill:var(--ink)}.small{font-size:15px;fill:var(--ink-soft)}.mini{font-size:13px;fill:var(--ink-soft)}
.arrow{stroke:var(--blue);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowOrange{stroke:var(--orange);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowGood{stroke:var(--good);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.flow{stroke-dasharray:8 14;animation:dash 1.1s linear infinite}.packet{filter:url(#glow)}
@keyframes dash{to{stroke-dashoffset:-44}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.badge{fill:var(--blue-soft);stroke:var(--blue);stroke-width:1.5}.dbtop{fill:var(--blue-soft);stroke:var(--blue-deep);stroke-width:2}.dbbody{fill:var(--paper);stroke:var(--blue-deep);stroke-width:2}
</style>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2b2f36" flood-opacity="0.08"/></filter>
<filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>



</defs>

<polygon points="600,175 930,345 930,545 600,715 270,545 270,345" fill="#f3f5f9" stroke="#e2e6ef" stroke-width="3"/><rect x="430" y="355" width="340" height="130" rx="22" fill="#fff" stroke="#1466c4" stroke-width="3"/><rect x="444" y="369" width="312" height="102" rx="16" fill="none" stroke="#1b86f2" stroke-width="2"/><text x="600" y="430" text-anchor="middle" class="label">DOMAINE MÉTIER</text><text x="600" y="458" text-anchor="middle" class="small">stable · pur · testable</text><rect x="330" y="220" width="150" height="58" rx="16" class="soft"/><text x="405" y="256" text-anchor="middle" class="small">HTTP Client</text><path id="in0" d="M405,278 C405,325 520,330 520,355" class="arrow flow"/><circle r="8" fill="#1b86f2" class="packet"><animateMotion dur="2.1s" repeatCount="indefinite" rotate="auto"><mpath href="#in0"/></animateMotion></circle><rect x="560" y="220" width="150" height="58" rx="16" class="soft"/><text x="635" y="256" text-anchor="middle" class="small">CLI</text><path id="in1" d="M635,278 C635,325 520,330 520,355" class="arrow flow"/><circle r="8" fill="#1b86f2" class="packet"><animateMotion dur="2.1s" repeatCount="indefinite" rotate="auto"><mpath href="#in1"/></animateMotion></circle><rect x="790" y="220" width="150" height="58" rx="16" class="soft"/><text x="865" y="256" text-anchor="middle" class="small">gRPC</text><path id="in2" d="M865,278 C865,325 520,330 520,355" class="arrow flow"/><circle r="8" fill="#1b86f2" class="packet"><animateMotion dur="2.1s" repeatCount="indefinite" rotate="auto"><mpath href="#in2"/></animateMotion></circle><rect x="330" y="610" width="150" height="58" rx="16" class="soft"/><text x="405" y="646" text-anchor="middle" class="code">PostgreSQL</text><path id="out0" d="M680,485 C680,540 405,555 405,610" class="arrow flow" stroke="#1b86f2"/><circle r="8" fill="#1b86f2" class="packet"><animateMotion dur="2.2s" repeatCount="indefinite" rotate="auto"><mpath href="#out0"/></animateMotion></circle><rect x="560" y="610" width="150" height="58" rx="16" class="soft"/><text x="635" y="646" text-anchor="middle" class="code">Redis</text><path id="out1" d="M680,485 C680,540 635,555 635,610" class="arrowOrange flow"/><circle r="8" fill="#ff9d18" class="packet"><animateMotion dur="2.2s" repeatCount="indefinite" rotate="auto"><mpath href="#out1"/></animateMotion></circle><rect x="790" y="610" width="150" height="58" rx="16" class="soft"/><text x="865" y="646" text-anchor="middle" class="code">Kafka</text><path id="out2" d="M680,485 C680,540 865,555 865,610" class="arrowGood flow"/><circle r="8" fill="#3bb273" class="packet"><animateMotion dur="2.2s" repeatCount="indefinite" rotate="auto"><mpath href="#out2"/></animateMotion></circle></svg>