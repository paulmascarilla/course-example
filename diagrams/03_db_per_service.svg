<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 165 1200 595" width="1200" height="595" role="img" aria-label="Schema 3 — DB per service (✅)">
<style>
:root{--ink:#2b2f36;--ink-soft:#6b7280;--line:#e2e6ef;--fill:#f3f5f9;--paper:#fff;--blue:#1b86f2;--blue-deep:#1466c4;--blue-soft:#e2f0fd;--orange:#ff9d18;--good:#3bb273;--bad:#e5534b}
svg{background:var(--paper);font-family:"Hanken Grotesk",Inter,Arial,sans-serif;color:var(--ink)}
.title{font-size:34px;font-weight:800;fill:var(--ink)}.subtitle{font-size:16px;fill:var(--ink-soft)}
.brand{font-family:"Caveat",cursive;font-weight:700;font-size:28px;fill:var(--blue-deep)}
.code{font-family:"JetBrains Mono",monospace;font-size:15px;fill:var(--ink-soft)}
.box{fill:var(--paper);stroke:var(--line);stroke-width:2;rx:20;filter:url(#shadow)}
.soft{fill:var(--fill);stroke:var(--line);stroke-width:2;rx:16}.label{font-size:22px;font-weight:800;fill:var(--ink)}.small{font-size:15px;fill:var(--ink-soft)}.mini{font-size:13px;fill:var(--ink-soft)}
.arrow{stroke:var(--blue);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowOrange{stroke:var(--orange);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowGood{stroke:var(--good);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.flow{stroke-dasharray:8 14;animation:dash 1.1s linear infinite}.packet{filter:url(#glow)}
@keyframes dash{to{stroke-dashoffset:-44}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.badge{fill:var(--blue-soft);stroke:var(--blue);stroke-width:1.5}.dbtop{fill:var(--blue-soft);stroke:var(--blue-deep);stroke-width:2}.dbbody{fill:var(--paper);stroke:var(--blue-deep);stroke-width:2}
</style>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2b2f36" flood-opacity="0.08"/></filter>
<filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#1b86f2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#ff9d18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowGood" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#3bb273" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="110" y="205" width="280" height="125" class="box"/><rect x="134" y="229" width="56" height="56" rx="16" fill="#1b86f2" opacity=".12" stroke="#1b86f2" stroke-width="2"/><text x="210" y="263" class="label">user-service</text><text x="210" y="293" class="small">User API</text><path id="a0" d="M250,330 L250,515" class="arrow flow" stroke="#1b86f2"/><circle r="8" fill="#1b86f2" class="packet"><animateMotion dur="1.8s" repeatCount="indefinite" rotate="auto"><mpath href="#a0"/></animateMotion></circle><ellipse cx="250.0" cy="485" rx="90.0" ry="20" fill="#1b86f2" opacity=".16" stroke="#1b86f2" stroke-width="2"/><path d="M160,485 v75 c0,11 180,11 180,0 v-75" fill="#fff" stroke="#1b86f2" stroke-width="2"/><ellipse cx="250.0" cy="560" rx="90.0" ry="20" fill="#fff" stroke="#1b86f2" stroke-width="2"/><text x="250.0" y="528.5" text-anchor="middle" class="code">PostgreSQL</text><rect x="460" y="205" width="280" height="125" class="box"/><rect x="484" y="229" width="56" height="56" rx="16" fill="#3bb273" opacity=".12" stroke="#3bb273" stroke-width="2"/><text x="560" y="263" class="label">order-service</text><text x="560" y="293" class="small">Order API</text><path id="a1" d="M600,330 L600,515" class="arrow flow" stroke="#3bb273"/><circle r="8" fill="#3bb273" class="packet"><animateMotion dur="1.8s" repeatCount="indefinite" rotate="auto"><mpath href="#a1"/></animateMotion></circle><ellipse cx="600.0" cy="485" rx="90.0" ry="20" fill="#3bb273" opacity=".16" stroke="#3bb273" stroke-width="2"/><path d="M510,485 v75 c0,11 180,11 180,0 v-75" fill="#fff" stroke="#3bb273" stroke-width="2"/><ellipse cx="600.0" cy="560" rx="90.0" ry="20" fill="#fff" stroke="#3bb273" stroke-width="2"/><text x="600.0" y="528.5" text-anchor="middle" class="code">MongoDB</text><rect x="810" y="205" width="280" height="125" class="box"/><rect x="834" y="229" width="56" height="56" rx="16" fill="#ff9d18" opacity=".12" stroke="#ff9d18" stroke-width="2"/><text x="910" y="263" class="label">billing-service</text><text x="910" y="293" class="small">Billing API</text><path id="a2" d="M950,330 L950,515" class="arrow flow" stroke="#ff9d18"/><circle r="8" fill="#ff9d18" class="packet"><animateMotion dur="1.8s" repeatCount="indefinite" rotate="auto"><mpath href="#a2"/></animateMotion></circle><ellipse cx="950.0" cy="485" rx="90.0" ry="20" fill="#ff9d18" opacity=".16" stroke="#ff9d18" stroke-width="2"/><path d="M860,485 v75 c0,11 180,11 180,0 v-75" fill="#fff" stroke="#ff9d18" stroke-width="2"/><ellipse cx="950.0" cy="560" rx="90.0" ry="20" fill="#fff" stroke="#ff9d18" stroke-width="2"/><text x="950.0" y="528.5" text-anchor="middle" class="code">Redis</text></svg>