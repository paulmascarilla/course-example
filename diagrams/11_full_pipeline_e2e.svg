<svg xmlns="http://www.w3.org/2000/svg" viewBox="56 146 1088 623" width="1200" height="687" role="img" aria-label="Schema 11 — Full pipeline with E2E">
<style>
:root{--ink:#2b2f36;--ink-soft:#6b7280;--line:#e2e6ef;--fill:#f3f5f9;--paper:#fff;--blue:#1b86f2;--blue-deep:#1466c4;--blue-soft:#e2f0fd;--orange:#ff9d18;--good:#3bb273;--bad:#e5534b}
svg{background:var(--paper);font-family:"Hanken Grotesk",Inter,Arial,sans-serif;color:var(--ink)}
.title{font-size:34px;font-weight:800;fill:var(--ink)}.subtitle{font-size:16px;fill:var(--ink-soft)}
.brand{font-family:"Caveat",cursive;font-weight:700;font-size:28px;fill:var(--blue-deep)}
.code{font-family:"JetBrains Mono",monospace;font-size:15px;fill:var(--ink-soft)}
.box{fill:var(--paper);stroke:var(--line);stroke-width:2;rx:20;filter:url(#shadow)}
.soft{fill:var(--fill);stroke:var(--line);stroke-width:2;rx:16}.label{font-size:22px;font-weight:800;fill:var(--ink)}.small{font-size:15px;fill:var(--ink-soft)}.mini{font-size:13px;fill:var(--ink-soft)}
.arrow{stroke:var(--blue);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowOrange{stroke:var(--orange);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.arrowGood{stroke:var(--good);stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.flow{stroke-dasharray:8 14;animation:dash 1.1s linear infinite}.packet{filter:url(#glow)}
@keyframes dash{to{stroke-dashoffset:-44}}@keyframes pulse{0%,100%{opacity:.35;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.badge{fill:var(--blue-soft);stroke:var(--blue);stroke-width:1.5}.dbtop{fill:var(--blue-soft);stroke:var(--blue-deep);stroke-width:2}.dbbody{fill:var(--paper);stroke:var(--blue-deep);stroke-width:2}
</style>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2b2f36" flood-opacity="0.08"/></filter>
<filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#1b86f2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#ff9d18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrowGood" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="none" stroke="#3bb273" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="415" y="170" width="370" height="70" rx="18" class="box"/><text x="600" y="202" text-anchor="middle" class="label">git push</text><text x="600" y="226" text-anchor="middle" class="mini"></text><rect x="415" y="260" width="370" height="70" rx="18" class="box"/><text x="600" y="292" text-anchor="middle" class="label">GitHub Actions CI</text><text x="600" y="316" text-anchor="middle" class="mini">checkout · install · test · build · push</text><rect x="415" y="370" width="370" height="70" rx="18" class="box"/><text x="600" y="402" text-anchor="middle" class="label">ArgoCD</text><text x="600" y="426" text-anchor="middle" class="mini"></text><rect x="415" y="460" width="370" height="70" rx="18" class="box"/><text x="600" y="492" text-anchor="middle" class="label">kubectl apply</text><text x="600" y="516" text-anchor="middle" class="mini">staging</text><rect x="415" y="550" width="370" height="70" rx="18" class="box"/><text x="600" y="582" text-anchor="middle" class="label">Tests E2E</text><text x="600" y="606" text-anchor="middle" class="mini"></text><path id="e0" d="M600,240 C640,245 600,255 600,260" class="arrowGood flow"/><circle r="6" fill="#3bb273" class="packet"><animateMotion dur="1.1s" repeatCount="indefinite" rotate="auto"><mpath href="#e0"/></animateMotion></circle><path id="e1" d="M600,330 C640,345 600,355 600,370" class="arrowGood flow"/><circle r="6" fill="#3bb273" class="packet"><animateMotion dur="1.1s" repeatCount="indefinite" rotate="auto"><mpath href="#e1"/></animateMotion></circle><path id="e2" d="M600,440 C640,445 600,455 600,460" class="arrowGood flow"/><circle r="6" fill="#3bb273" class="packet"><animateMotion dur="1.1s" repeatCount="indefinite" rotate="auto"><mpath href="#e2"/></animateMotion></circle><path id="e3" d="M600,530 C640,535 600,545 600,550" class="arrowGood flow"/><circle r="6" fill="#3bb273" class="packet"><animateMotion dur="1.1s" repeatCount="indefinite" rotate="auto"><mpath href="#e3"/></animateMotion></circle><path id="e4" d="M600,620 C630,625 600,630 600,635" class="arrowGood flow"/><circle r="6" fill="#3bb273" class="packet"><animateMotion dur="0.8s" repeatCount="indefinite" rotate="auto"><mpath href="#e4"/></animateMotion></circle><polygon points="600,635 720,690 600,745 480,690" fill="#fff" stroke="#e2e6ef" stroke-width="2" filter="url(#shadow)"/><text x="600" y="696" text-anchor="middle" class="label">OK ?</text><path id="ok" d="M720,690 C820,690 850,620 900,620" class="arrowGood flow"/><circle r="8" fill="#3bb273" class="packet"><animateMotion dur="1.6s" repeatCount="indefinite" rotate="auto"><mpath href="#ok"/></animateMotion></circle><rect x="900" y="585" width="220" height="70" rx="18" fill="#e9f8ef" stroke="#3bb273" stroke-width="2"/><text x="1010" y="628" text-anchor="middle" class="label">prod deploy</text><text x="1010" y="660" text-anchor="middle" class="mini">manual or canary</text><path id="ko" d="M480,690 C380,690 350,620 300,620" class="arrowOrange flow"/><circle r="8" fill="#ff9d18" class="packet"><animateMotion dur="1.6s" repeatCount="indefinite" rotate="auto"><mpath href="#ko"/></animateMotion></circle><rect x="80" y="585" width="220" height="70" rx="18" fill="#fff3f1" stroke="#e5534b" stroke-width="2"/><text x="190" y="628" text-anchor="middle" class="label">Slack alert</text><text x="405" y="675" class="small">KO</text><text x="772" y="675" class="small">OK</text></svg>