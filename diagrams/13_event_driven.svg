<svg xmlns="http://www.w3.org/2000/svg" viewBox="56 106 1008 413" width="1200" height="492" role="img" aria-label="Schema 13 — Event-Driven Architecture">
<style>
:root{--ink:#2b2f36;--ink-soft:#6b7280;--line:#e2e6ef;--fill:#f3f5f9;--paper:#fff;--blue:#1b86f2;--blue-deep:#1466c4;--blue-soft:#e2f0fd;--orange:#ff9d18;--good:#3bb273;--bad:#e5534b}
svg{background:var(--paper);font-family:"Hanken Grotesk",Inter,Arial,sans-serif;color:var(--ink)}
.code{font-family:"JetBrains Mono",monospace;font-size:15px;fill:var(--ink-soft)}
.box{fill:var(--paper);stroke:var(--line);stroke-width:2;filter:url(#shadow)}
.label{font-size:22px;font-weight:800;fill:var(--ink)}.small{font-size:15px;fill:var(--ink-soft)}.mini{font-size:13px;fill:var(--ink-soft)}
.flow{stroke-dasharray:8 14;animation:dash 1.1s linear infinite}.packet{filter:url(#glow)}
@keyframes dash{to{stroke-dashoffset:-44}}
</style>
<defs>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#2b2f36" flood-opacity="0.08"/></filter>
<filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<text x="560" y="134" text-anchor="middle" font-size="14" fill="#6b7280" font-style="italic">Les services communiquent via des événements asynchrones — pas de couplage direct entre producteur et consommateurs</text>

<!-- order-service (publisher) -->
<rect x="80" y="280" width="230" height="110" rx="20" filter="url(#shadow)" fill="#fff" stroke="#1b86f2" stroke-width="2"/>
<rect x="104" y="304" width="56" height="56" rx="16" fill="#e2f0fd" stroke="#1b86f2" stroke-width="2"/>
<text x="195" y="338" text-anchor="middle" class="label">order-service</text>
<text x="195" y="368" text-anchor="middle" class="small">publie OrderCreated</text>

<!-- Label "PRODUCTEUR" -->
<text x="195" y="276" text-anchor="middle" font-size="12" fill="#1b86f2" font-weight="700" letter-spacing="1">PRODUCTEUR</text>

<!-- Arrow order → EventBus -->
<path id="pub" d="M310,335 L430,335" fill="none" stroke="#ff9d18" stroke-width="2.5" stroke-dasharray="8 14" class="flow"/>
<circle r="7" fill="#ff9d18" class="packet"><animateMotion dur="1.3s" repeatCount="indefinite" rotate="auto"><mpath href="#pub"/></animateMotion></circle>

<!-- EventBus / Kafka -->
<rect x="430" y="265" width="230" height="140" rx="20" filter="url(#shadow)" fill="#fff3e6" stroke="#ff9d18" stroke-width="2"/>
<text x="545" y="325" text-anchor="middle" class="label">EventBus</text>
<text x="545" y="352" text-anchor="middle" class="code" fill="#cc6f00" font-weight="700">Kafka</text>
<text x="545" y="375" text-anchor="middle" class="mini">OrderCreated</text>

<!-- Label "BUS DE MESSAGES" -->
<text x="545" y="261" text-anchor="middle" font-size="12" fill="#cc6f00" font-weight="700" letter-spacing="1">BUS DE MESSAGES</text>

<!-- Label "CONSOMMATEURS" -->
<text x="915" y="161" text-anchor="middle" font-size="12" fill="#3bb273" font-weight="700" letter-spacing="1">CONSOMMATEURS</text>

<!-- Fan arrows EventBus → consumers -->
<path id="ev0" d="M660,335 C730,335 730,225 800,225" fill="none" stroke="#3bb273" stroke-width="2.5" stroke-dasharray="8 14" class="flow"/>
<circle r="7" fill="#3bb273" class="packet"><animateMotion dur="1.9s" repeatCount="indefinite" rotate="auto"><mpath href="#ev0"/></animateMotion></circle>

<path id="ev1" d="M660,335 L800,335" fill="none" stroke="#3bb273" stroke-width="2.5" stroke-dasharray="8 14" class="flow"/>
<circle r="7" fill="#3bb273" class="packet"><animateMotion dur="1.9s" repeatCount="indefinite" rotate="auto"><mpath href="#ev1"/></animateMotion></circle>

<path id="ev2" d="M660,335 C730,335 730,445 800,445" fill="none" stroke="#3bb273" stroke-width="2.5" stroke-dasharray="8 14" class="flow"/>
<circle r="7" fill="#3bb273" class="packet"><animateMotion dur="1.9s" repeatCount="indefinite" rotate="auto"><mpath href="#ev2"/></animateMotion></circle>

<!-- billing-service -->
<rect x="800" y="175" width="260" height="100" rx="20" filter="url(#shadow)" fill="#fff" stroke="#e2e6ef" stroke-width="2"/>
<rect x="824" y="199" width="56" height="56" rx="16" fill="#3bb273" opacity=".12" stroke="#3bb273" stroke-width="2"/>
<text x="930" y="233" text-anchor="middle" class="label">billing-service</text>
<text x="930" y="260" text-anchor="middle" class="small">consomme</text>

<!-- notification-service -->
<rect x="800" y="285" width="260" height="100" rx="20" filter="url(#shadow)" fill="#fff" stroke="#e2e6ef" stroke-width="2"/>
<rect x="824" y="309" width="56" height="56" rx="16" fill="#3bb273" opacity=".12" stroke="#3bb273" stroke-width="2"/>
<text x="930" y="343" text-anchor="middle" class="label">notification-service</text>
<text x="930" y="370" text-anchor="middle" class="small">consomme</text>

<!-- inventory-service -->
<rect x="800" y="395" width="260" height="100" rx="20" filter="url(#shadow)" fill="#fff" stroke="#e2e6ef" stroke-width="2"/>
<rect x="824" y="419" width="56" height="56" rx="16" fill="#3bb273" opacity=".12" stroke="#3bb273" stroke-width="2"/>
<text x="930" y="453" text-anchor="middle" class="label">inventory-service</text>
<text x="930" y="480" text-anchor="middle" class="small">consomme</text>
</svg>
